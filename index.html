<!doctype html>
<html lang="ja">
  <head>
    <meta name="robots" content="noindex,nofollow" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <!-- meta情報 -->
    <title>レモンケーキ | お問い合わせ</title>
    <meta
      name="description"
      content="お問い合わせはこちらから行うことができます。商品やサービスに関するご質問、ご提案、その他何でもお気軽にご連絡ください。"
    />
    <meta name="keywords" content="" />
    <!-- ogp -->
    <meta property="og:title" content="レモンケーキ | お問い合わせ" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://contact-form-kenchan-cake.vercel.app/"
    />
    <meta
      property="og:image"
      content="https://contact-form-kenchan-cake.vercel.app/images/ogp-img.jpg"
    />
    <meta property="og:site_name" content="Lemon cake" />
    <meta
      property="og:description"
      content="お問い合わせはこちらから行うことができます。商品やサービスに関するご質問、ご提案、その他何でもお気軽にご連絡ください。"
    />
    <meta name="twitter:card" content="summary" />
    <!-- ファビコン -->
    <link rel="icon" href="./images/logo.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ファーストビューの背景画像を先に読み込む -->
    <link rel="preload" as="image" href="./images/Lemon-cake.jpeg" />
    <link rel="preload" as="image" href="./images/Lemon-cake.jpeg" />

    <!-- css -->
    <link rel="stylesheet" href="./sass/style.css" />

    <!-- JavaScript -->
    <script
      src="https://code.jquery.com/jquery-3.6.1.min.js"
      integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ="
      crossorigin="anonymous"
      defer
    ></script>
    <script src="/js/script.js" defer></script>
  </head>

  <body>
    <header class="header js-header">
      <div class="header__inner">
        <img
          src="./images/lemon_logo_ultra_minimal.svg"
          alt=""
          class="header__logo"
          loading="lazy"
        />
        <h1 class="header__name">Re:Lemon</h1>
        <nav class="header__nav md-none">
          <ul class="header__items">
            <li class="header__item">
              <a href="#vision" class="header__link">Vision</a>
            </li>
            <li class="header__item">
              <a href="#service" class="header__link">Service</a>
            </li>
            <li class="header__item">
              <a href="#news" class="header__link">News</a>
            </li>
          </ul>
        </nav>
        <a href="#contact" class="header__contact contact-button md-none"
          >Contact</a
        >
      </div>
    </header>

    <div class="hamburger js-hamburger md-show">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="drawer-menu js-drawer">
      <div class="drawer-menu__inner">
        <ul class="drawer-menu__items">
          <li class="drawer-menu__item">
            <a href="#vision" class="drawer-menu__link">Vision</a>
          </li>
          <li class="drawer-menu__item">
            <a href="#service" class="drawer-menu__link">Service</a>
          </li>
          <li class="drawer-menu__item">
            <a href="#news" class="drawer-menu__link">News</a>
          </li>
        </ul>
        <a href="#contact" class="drawer-menu__contact contact-button"
          >Contact</a
        >
      </div>
    </div>

    <main>
      <!-- Fv -->
      <div class="fv">
        <h1 class="fv__title">お問い合わせ</h1>
      </div>

      <!-- お問い合せ -->
      <div class="contact">
        <div class="contact__inner">
          <p class="contact__text">
            レモンケーキのお問い合わせは<br />
            下記フォームより受け付けております。<br />
            確認後、折り返しご連絡させていただきます。
          </p>
          <form class="contact__form" action="confirm.html" method="get">
            <div class="contact__item">
              <div class="contact__label">
                <label for="name" class="contact__label-text">お名前</label>
                <span class="contact__required">必須</span>
              </div>
              <input
                type="text"
                id="name"
                name="name"
                class="contact__input"
                placeholder="山田 太郎"
                required
              />
            </div>
            <div class="contact__item">
              <div class="contact__label">
                <label for="mail" class="contact__label-text">
                  メールアドレス</label
                >
                <span class="contact__required">必須</span>
              </div>
              <input
                type="email"
                id="mail"
                name="mail"
                class="contact__input"
                placeholder="〇〇@info.com"
                required
              />
            </div>
            <div class="contact__item">
              <div class="contact__label">
                <label for="mail" class="contact__label-text"> 電話番号</label>
                <span class="contact__required">必須</span>
              </div>
              <input
                type="tel"
                id="tel"
                name="tel"
                class="contact__input"
                placeholder="012-345-6789"
                required
              />
            </div>

            <div class="contact__item">
              <div class="contact__label">
                <label for="contents" class="contact__label-text">住所</label>
                <span class="contact__required">必須</span>
              </div>
              <textarea
                class="contact__textarea"
                id="contents"
                name="contents"
                placeholder="住所を入力してください"
                required
              ></textarea>
            </div>

            <div class="contact__item">
              <div class="contact__label">
                <label for="type" class="contact__label-text"
                  >お問い合わせの種類</label
                >
                <span class="contact__required">必須</span>
              </div>
              <div class="contact__select-wrap">
                <select
                  class="contact__select"
                  id="type"
                  name="inquiryType"
                  required
                >
                  <option value="">選択してください</option>
                  <option value="レモンケーキのご注文">
                    レモンケーキのご注文
                  </option>
                  <option value="他のお菓子について">他のお菓子について</option>
                  <option value="その他">その他</option>
                </select>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__label">
                <label for="type" class="contact__label-text">個数</label>
                <span class="contact__required">必須</span>
              </div>
              <div class="contact__select-wrap">
                <select
                  class="contact__select"
                  id="quantity"
                  name="quantity"
                  required
                >
                  <option value="">選択してください</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                  <option value="6">6</option>
                  <option value="7">7</option>
                  <option value="その他">その他</option>
                </select>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__label">
                <label for="type" class="contact__label-text"
                  >贈答用包装紙の有無</label
                >
                <!-- <span class="contact__required">必須</span> -->
              </div>
              <div class="contact__select-wrap">
                <select class="contact__select" id="wrap" name="wrap">
                  <option value="">選択してください</option>
                  <option value="のし紙">のし紙</option>
                  <option value="包装紙">包装紙</option>
                  <option value="包装紙・リボン">包装紙・リボン</option>
                  <option value="その他">その他</option>
                </select>
              </div>
            </div>

            <div class="contact__item">
              <div class="contact__label">
                <label for="contents" class="contact__label-text"
                  >その他配送に関するご希望ございましたらご記載ください</label
                >
              </div>
              <textarea
                class="contact__textarea"
                id="message"
                name="message"
                placeholder="お問い合わせ内容を入力してください"
              ></textarea>
            </div>

            <button class="contact__button" type="submit">確認する</button>
          </form>
        </div>
      </div>
    </main>

    <footer class="footer">
      <small class="footer__copyright">&copy; 2026 Héritage</small>
    </footer>
  </body>
</html>
