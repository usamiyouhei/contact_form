  <body>
    <header class="header js-header">

        />
        <h1 class="header__name">Re:Lemon cake</h1>
        <nav class="header__nav md-none">
          <ul class="header__items">
            <li class="header__item">
              <a href="#vision" class="header__link">Vision</a>
            </li>
            <li class="header__item">
              <a href="#service" class="header__link">Service</a>
            </li>
            <li class="header__item">

            </li>
          </ul>
        </nav>
        <a href="#contact" class="header__contact contact-button md-none"

      </div>

    <div class="hamburger js-hamburger md-show">
      <span></span>
      <span></span>
      <span></span>

        <ul class="drawer-menu__items">
          <li class="drawer-menu__item">

          </li>
          <li class="drawer-menu__item">
            <a href="#service" class="drawer-menu__link">Service</a>

          </li>
        </ul>
        <a href="#contact" class="drawer-menu__contact contact-button"

    <main>
      <div class="fv">
        <h1 class="fv__title">✔ 送信完了しました</h1>
      </div>
      <div class="contact__inner">
        <div class="thanks__inner">
          <h2 class="thanks__title">ご注文ありがとうございます</h2>
          <p>ご注文内容を確認の上、メールにてご連絡いたします。</p>

          <div class="thanks__flow">
            <p>▼ 今後の流れ</p>
            <ul>
              <li>① ご注文確認メール送信</li>
              <li>② 発送準備（1〜3日）</li>

              一つ一つ丁寧に焼き上げたレモンケーキを<br />
              心を込めてお届けします。
            </p>
          </div>
          <div class="thanks__actions">
            <a href="/" class="contact__button">トップへ戻る</a>
            <a
              href="https://instagram.com/xxxxx"
              class="contact__button secondary"
            >
              Instagramを見る
            </a>
          </div>
        </div>
      </div>

    <footer class="footer">
      <small class="footer__copyright">&copy; 2026 Héritage</small>
