<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1400" viewBox="0 0 1400 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="250" y1="180" x2="1120" y2="1180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3E3A2"/>
      <stop offset="22%" stop-color="#D7BB62"/>
      <stop offset="46%" stop-color="#A97A1D"/>
      <stop offset="72%" stop-color="#8B6517"/>
      <stop offset="100%" stop-color="#5E4310"/>
    </linearGradient>

    <linearGradient id="goldSoft" x1="430" y1="350" x2="930" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EED98E"/>
      <stop offset="50%" stop-color="#B88822"/>
      <stop offset="100%" stop-color="#6C4D12"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer aura -->
  <circle cx="700" cy="700" r="435" stroke="url(#gold)" stroke-opacity="0.16" stroke-width="2"/>

  <!-- philosophical leaf / flame -->
  <path
    d="M705 258
       C774 227 833 232 878 283
       C829 282 790 300 761 335
       C734 368 722 411 722 462"
    stroke="url(#gold)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- main lemon contour -->
  <path
    d="M700 350
       C921 350 1088 521 1088 700
       C1088 879 921 1050 700 1050
       C479 1050 312 879 312 700
       C312 521 479 350 700 350Z"
    stroke="url(#gold)"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- top opening for minimalism -->
  <path
    d="M545 377
       C592 359 645 350 700 350
       C757 350 811 360 859 379"
    stroke="rgba(255,255,255,0)"
    stroke-width="22"
    stroke-linecap="round"
  />

  <!-- inner vertical seed / axis -->
  <path
    d="M700 470
       C700 470 699 582 699 700
       C699 817 700 926 700 926"
    stroke="url(#goldSoft)"
    stroke-width="13"
    stroke-linecap="round"
  />

  <!-- upper seed -->
  <path
    d="M700 505
       C742 551 742 609 700 645
       C658 609 658 551 700 505Z"
    stroke="url(#goldSoft)"
    stroke-width="12"
    stroke-linejoin="round"
  />

  <!-- lower seed -->
  <path
    d="M700 752
       C742 798 742 856 700 892
       C658 856 658 798 700 752Z"
    stroke="url(#goldSoft)"
    stroke-width="12"
    stroke-linejoin="round"
  />

  <!-- subtle horizon cut to feel iconic -->
  <path
    d="M410 700
       C520 674 620 661 700 661
       C780 661 880 674 990 700"
    stroke="url(#gold)"
    stroke-opacity="0.28"
    stroke-width="8"
    stroke-linecap="round"
  />
</svg>
